services:
  postgres:
    image: postgres:18-alpine
    container_name: neomarket-postgres
    environment:
      POSTGRES_USER: neomarket
      POSTGRES_PASSWORD: neomarket_dev_2026
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neomarket -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - neomarket-network

volumes:
  postgres_data:
    driver: local

networks:
  neomarket-network:
    driver: bridge
