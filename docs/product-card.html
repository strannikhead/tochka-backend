<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Карточка товара — NeoMarket</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Source+Serif+4:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink: #101828;
      --muted: #475467;
      --accent: #d9480f;
      --accent-soft: #ffe6d6;
      --cool: #0b4f6c;
      --line: rgba(16, 24, 40, 0.12);
      --bg: #f7f2ea;
      --panel: #ffffff;
      --shadow: 0 24px 60px rgba(16, 24, 40, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: radial-gradient(circle at top left, #fff4dc, transparent 55%),
        radial-gradient(circle at 20% 30%, #e7f1ff, transparent 60%),
        var(--bg);
      color: var(--ink);
      font-family: "Space Grotesk", system-ui, sans-serif;
    }

    header {
      padding: 24px 6vw 0;
    }

    header a {
      text-decoration: none;
      color: var(--cool);
      font-weight: 600;
    }

    main {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(0, 0.9fr);
      gap: 32px;
      padding: 32px 6vw 64px;
    }

    .gallery {
      background: var(--panel);
      border-radius: 28px;
      padding: 24px;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .gallery::after {
      content: "";
      position: absolute;
      width: 240px;
      height: 240px;
      border-radius: 50%;
      right: -80px;
      top: -60px;
      background: rgba(13, 148, 136, 0.12);
      filter: blur(10px);
    }

    .gallery__image {
      width: 100%;
      border-radius: 18px;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      border: 1px solid var(--line);
      background: #f3f4f6;
      animation: fadeUp 0.5s ease;
    }

    .gallery__strip {
      display: flex;
      gap: 12px;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    .gallery__thumb {
      width: 72px;
      height: 56px;
      border-radius: 12px;
      border: 1px solid var(--line);
      object-fit: cover;
      opacity: 0.65;
      cursor: pointer;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }

    .gallery__thumb--active {
      opacity: 1;
      transform: translateY(-2px);
      border-color: var(--cool);
    }

    .details {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .details__card {
      background: var(--panel);
      border-radius: 24px;
      padding: 24px;
      box-shadow: var(--shadow);
    }

    .status {
      padding: 10px 14px;
      border-radius: 12px;
      background: #eef2ff;
      color: #3730a3;
      font-size: 14px;
      margin-bottom: 12px;
    }

    .status--error {
      background: #fee2e2;
      color: #991b1b;
    }

    .details__title {
      font-size: 32px;
      margin: 0 0 12px 0;
      letter-spacing: -0.02em;
    }

    .details__desc {
      margin: 0 0 16px 0;
      color: var(--muted);
      font-family: "Source Serif 4", serif;
      font-size: 17px;
      line-height: 1.5;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-weight: 600;
      font-size: 14px;
    }

    .price {
      display: flex;
      align-items: baseline;
      gap: 12px;
    }

    .price__current {
      font-size: 32px;
      font-weight: 700;
    }

    .price__old {
      font-size: 18px;
      color: #9aa0a6;
      text-decoration: line-through;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 16px;
    }

    .btn {
      border: none;
      border-radius: 14px;
      padding: 12px 18px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn--primary {
      background: var(--cool);
      color: #fff;
    }

    .btn--primary:disabled {
      background: #cbd5e1;
      cursor: not-allowed;
    }

    .btn--ghost {
      background: transparent;
      color: var(--cool);
      border: 1px solid var(--cool);
    }

    .sku-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 12px;
    }

    .sku-item {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      transition: transform 0.2s ease, border-color 0.2s ease;
      background: #fff;
    }

    .sku-item:hover {
      transform: translateX(2px);
      border-color: var(--cool);
    }

    .sku-item--active {
      border-color: var(--accent);
      box-shadow: 0 12px 24px rgba(217, 72, 15, 0.15);
    }

    .sku-item__name {
      font-weight: 600;
    }

    .sku-item__meta {
      color: var(--muted);
      font-size: 14px;
    }

    .sku-item__status {
      font-size: 14px;
      font-weight: 600;
      color: var(--cool);
    }

    .sku-item__status--off {
      color: #d9480f;
    }

    .characteristics {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-top: 16px;
    }

    .characteristic {
      padding: 12px 14px;
      border-radius: 12px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
    }

    .characteristic__name {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .characteristic__value {
      font-weight: 600;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 960px) {
      main {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header>
    <a href="index.html">← назад к документации</a>
  </header>
  <main>
    <section class="gallery">
      <img id="mainImage" class="gallery__image" src="" alt="Фото товара" />
      <div id="thumbs" class="gallery__strip"></div>
    </section>

    <section class="details">
      <div class="details__card">
        <div id="status" class="status">Загружаем карточку...</div>
        <span id="discountBadge" class="badge" hidden>Скидка</span>
        <h1 id="productTitle" class="details__title"></h1>
        <p id="productDesc" class="details__desc"></p>
        <div class="price">
          <span id="currentPrice" class="price__current"></span>
          <span id="oldPrice" class="price__old" hidden></span>
        </div>
        <div class="actions">
          <button id="addToCart" class="btn btn--primary">В корзину</button>
          <button class="btn btn--ghost">В избранное</button>
        </div>
      </div>

      <div class="details__card">
        <h2>Вариации</h2>
        <div id="skuList" class="sku-list"></div>
      </div>

      <div class="details__card">
        <h2>Характеристики</h2>
        <div id="characteristics" class="characteristics"></div>
      </div>
    </section>
  </main>

  <script>
    const DEFAULT_PRODUCT_ID = "770e8400-e29b-41d4-a716-446655440002";
    const API_BASE_URL = "http://localhost:8002";

    const params = new URLSearchParams(window.location.search);
    const skuParam = params.get("sku");
    const productId = params.get("id") || DEFAULT_PRODUCT_ID;

    let product = null;
    let productImages = [];
    let selectedSkuId = skuParam;

    const gallery = document.getElementById("mainImage");
    const thumbs = document.getElementById("thumbs");
    const skuList = document.getElementById("skuList");
    const title = document.getElementById("productTitle");
    const description = document.getElementById("productDesc");
    const discountBadge = document.getElementById("discountBadge");
    const currentPrice = document.getElementById("currentPrice");
    const oldPrice = document.getElementById("oldPrice");
    const addToCart = document.getElementById("addToCart");
    const characteristics = document.getElementById("characteristics");
    const status = document.getElementById("status");

    function formatPrice(value) {
      return new Intl.NumberFormat("ru-RU").format(value / 100) + " ₽";
    }

    function setActiveImage(index) {
      const image = productImages[index] || productImages[0];
      if (!image) {
        return;
      }
      gallery.src = image.url;
      [...thumbs.children].forEach((thumb, idx) => {
        thumb.classList.toggle("gallery__thumb--active", idx === index);
      });
    }

    function renderGallery() {
      thumbs.innerHTML = "";
      productImages.forEach((image, idx) => {
        const thumb = document.createElement("img");
        thumb.src = image.url;
        thumb.alt = "Миниатюра";
        thumb.className = "gallery__thumb";
        thumb.addEventListener("click", () => setActiveImage(idx));
        thumbs.appendChild(thumb);
      });
      setActiveImage(0);
    }

    function renderCharacteristics() {
      characteristics.innerHTML = "";
      product.characteristics.forEach((item) => {
        const block = document.createElement("div");
        block.className = "characteristic";
        block.innerHTML = `
          <div class="characteristic__name">${item.name}</div>
          <div class="characteristic__value">${item.value}</div>
        `;
        characteristics.appendChild(block);
      });
    }

    function isSkuAvailable(sku) {
      if (typeof sku.in_stock === "boolean") {
        return sku.in_stock;
      }
      if (typeof sku.quantity === "number") {
        return sku.quantity > 0;
      }
      if (typeof sku.active_quantity === "number") {
        return sku.active_quantity > 0;
      }
      return false;
    }

    function skuImageUrl(sku) {
      if (sku.image) {
        return sku.image;
      }
      if (sku.images && sku.images.length > 0) {
        return sku.images[0].url;
      }
      return productImages[0]?.url || "";
    }

    function setSku(sku) {
      const isAvailable = isSkuAvailable(sku);
      const hasDiscount = sku.discount > 0;

      currentPrice.textContent = formatPrice(sku.price - sku.discount);
      oldPrice.hidden = !hasDiscount;
      discountBadge.hidden = !hasDiscount;
      if (hasDiscount) {
        oldPrice.textContent = formatPrice(sku.price);
      }

      addToCart.disabled = !isAvailable;
      addToCart.textContent = isAvailable ? "В корзину" : "Нет в наличии";

      const nextImage = skuImageUrl(sku);
      if (nextImage) {
        gallery.src = nextImage;
      }
    }

    function renderSkus() {
      skuList.innerHTML = "";
      product.skus.forEach((sku) => {
        const item = document.createElement("div");
        const isActive = sku.id === selectedSkuId;
        const isAvailable = isSkuAvailable(sku);

        item.className = `sku-item${isActive ? " sku-item--active" : ""}`;
        item.innerHTML = `
          <div>
            <div class="sku-item__name">${sku.name}</div>
            <div class="sku-item__meta">${sku.characteristics.map((c) => c.value).join(" · ")}</div>
          </div>
          <div class="sku-item__status${isAvailable ? "" : " sku-item__status--off"}">
            ${isAvailable ? "В наличии" : "Нет в наличии"}
          </div>
        `;

        item.addEventListener("click", () => {
          const nextParams = new URLSearchParams(window.location.search);
          nextParams.set("sku", sku.id);
          nextParams.set("id", product.id);
          history.replaceState(null, "", `?${nextParams.toString()}`);
          setSku(sku);
          renderSkus();
        });

        skuList.appendChild(item);
      });
    }

    function setStatus(message, isError = false) {
      status.textContent = message;
      status.classList.toggle("status--error", isError);
      status.hidden = !message;
    }

    function normalizeImages(images) {
      return (images || [])
        .map((image) => ({
          url: image.url,
          order: typeof image.order === "number" ? image.order : image.ordering || 0
        }))
        .sort((a, b) => a.order - b.order);
    }

    async function loadProduct() {
      setStatus("Загружаем карточку...");
      try {
        const response = await fetch(`${API_BASE_URL}/api/v1/products/${productId}`);
        if (response.status === 404) {
          setStatus("Товар недоступен. Вернитесь в каталог.", true);
          return;
        }
        if (response.status >= 500) {
          setStatus("Не удалось загрузить товар. Попробуйте позже.", true);
          return;
        }
        if (!response.ok) {
          setStatus("Ошибка загрузки карточки товара.", true);
          return;
        }

        product = await response.json();
      } catch (error) {
        setStatus("Не удалось подключиться к сервису B2C.", true);
        return;
      }

      productImages = normalizeImages(product.images);
      title.textContent = product.title;
      description.textContent = product.description;
      selectedSkuId = selectedSkuId || (product.skus[0] && product.skus[0].id);

      renderGallery();
      renderCharacteristics();
      renderSkus();

      const initialSku = product.skus.find((sku) => sku.id === selectedSkuId) || product.skus[0];
      if (initialSku) {
        setSku(initialSku);
      }

      setStatus("");
    }

    loadProduct();
  </script>
</body>
</html>
