name: CI Pipeline

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: docker.io
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
  UV_CACHE_DIR: /tmp/.uv-cache

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      b2b: ${{ steps.changes.outputs.b2b }}
      b2c: ${{ steps.changes.outputs.b2c }}
      moderation: ${{ steps.changes.outputs.moderation }}
      shared: ${{ steps.changes.outputs.shared }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed services
        id: changes
        run: |
          if [[ "${{ github.event_name }}" == "push" && ("${{ github.ref }}" == "refs/heads/main" || "${{ github.ref }}" == "refs/heads/master") ]]; then
            echo "b2b=true" >> $GITHUB_OUTPUT
            echo "b2c=true" >> $GITHUB_OUTPUT
            echo "moderation=true" >> $GITHUB_OUTPUT
            echo "shared=true" >> $GITHUB_OUTPUT
          else
            git diff --name-only origin/main...HEAD > /tmp/changed_files.txt 2>/dev/null || git diff --name-only HEAD~1...HEAD > /tmp/changed_files.txt 2>/dev/null || echo "" > /tmp/changed_files.txt

            echo "b2b=$(grep -q '^b2b/' /tmp/changed_files.txt && echo 'true' || echo 'false')" >> $GITHUB_OUTPUT
            echo "b2c=$(grep -q '^b2c/' /tmp/changed_files.txt && echo 'true' || echo 'false')" >> $GITHUB_OUTPUT
            echo "moderation=$(grep -q '^moderation/' /tmp/changed_files.txt && echo 'true' || echo 'false')" >> $GITHUB_OUTPUT
            echo "shared=$(grep -q '^shared/' /tmp/changed_files.txt && echo 'true' || echo 'false')" >> $GITHUB_OUTPUT
          fi

  lint:
    name: Lint (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: detect-changes
    strategy:
      matrix:
        service: [b2b, b2c, moderation, shared]
      fail-fast: false
    if: |
      always() && (
        (matrix.service == 'b2b' && needs.detect-changes.outputs.b2b == 'true') ||
        (matrix.service == 'b2c' && needs.detect-changes.outputs.b2c == 'true') ||
        (matrix.service == 'moderation' && needs.detect-changes.outputs.moderation == 'true') ||
        (matrix.service == 'shared' && needs.detect-changes.outputs.shared == 'true')
      )
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: '3.14'

      - name: Run ruff lint
        run: |
          # Используем uv run для запуска без предварительной ручной установки ruff
          uv run ruff check ${{ matrix.service }}/src --output-format=json > /tmp/ruff-output.json || true
          uv run ruff check ${{ matrix.service }}/src --output-format=github
          exit 0

  sast:
    name: SAST (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: [detect-changes, lint]
    strategy:
      matrix:
        service: [b2b, b2c, moderation, shared]
      fail-fast: false
    if: |
      always() && (
        (matrix.service == 'b2b' && needs.detect-changes.outputs.b2b == 'true') ||
        (matrix.service == 'b2c' && needs.detect-changes.outputs.b2c == 'true') ||
        (matrix.service == 'moderation' && needs.detect-changes.outputs.moderation == 'true') ||
        (matrix.service == 'shared' && needs.detect-changes.outputs.shared == 'true')
      )
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: '3.14'

      - name: Run Bandit security scan
        run: |
          uv run bandit -r ${{ matrix.service }}/src -f json -o /tmp/bandit-report.json || true
          uv run bandit -r ${{ matrix.service }}/src -f txt

  tests:
    name: Tests (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: [detect-changes, lint, sast]
    strategy:
      matrix:
        service: [b2b, b2c, moderation, shared]
      fail-fast: false
    if: |
      always() && (
        (matrix.service == 'b2b' && needs.detect-changes.outputs.b2b == 'true') ||
        (matrix.service == 'b2c' && needs.detect-changes.outputs.b2c == 'true') ||
        (matrix.service == 'moderation' && needs.detect-changes.outputs.moderation == 'true') ||
        (matrix.service == 'shared' && needs.detect-changes.outputs.shared == 'true')
      )
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: '3.14'

      - name: Install dependencies
        run: uv sync --all-packages

      - name: Run tests
        run: |
          uv run pytest ${{ matrix.service }}/tests \
            --cov=${{ matrix.service }}/src \
            --cov-report=term-summary \
            --cov-report=json:/tmp/coverage-${{ matrix.service }}.json \
            -v
        continue-on-error: true

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports-${{ matrix.service }}
          path: /tmp/coverage-*.json
        continue-on-error: true

