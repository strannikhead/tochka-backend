        price: 89990
        active_quantity: 3
        images:
          - url: /s3/451a3d11-996f-49ba-8f6f-748dc1f7ce4c.jpg
            ordering: 0
        characteristics:
          - name: Цвет
            value: Чёрный
          - name: Объём памяти
            value: 256 ГБ
        product_id: b26fc63e-573b-4ed2-983a-2dbcfb597761
